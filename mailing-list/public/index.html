<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ing@htl.ing – Mailingliste</title>
<style>
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f9f9f9;color:#2c3e50;
       display:flex;min-height:100vh;align-items:center;justify-content:center;padding:1.5rem;margin:0}
  .box{max-width:480px;width:100%;background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:2rem;
       box-shadow:0 2px 12px rgba(0,0,0,.08)}
  h1{font-size:1.3rem;margin:0 0 .75rem;color:#2c3e50}
  p{margin:0 0 1rem;line-height:1.6}
  form{display:flex;gap:.5rem;flex-wrap:wrap}
  input[type=email]{flex:1;min-width:200px;padding:.6rem .75rem;border:1px solid #dee2e6;border-radius:6px;font-size:1rem}
  button{background:#c0392b;color:#fff;border:none;border-radius:6px;padding:.6rem 1.25rem;font-weight:600;cursor:pointer}
  button:hover{background:#96281b}
  #status{margin-top:.75rem;font-size:.9rem}
  a{color:#c0392b}
</style>
</head>
<body>
  <div class="box">
    <h1>Mailingliste ing@htl.ing</h1>
    <p>
      Melde dich mit deiner E-Mail-Adresse an, um Nachrichten der Liste
      <strong>ing@htl.ing</strong> zu erhalten und selbst welche zu senden.
      Alternativ genügt eine E-Mail an <strong>anmeldung@htl.ing</strong>.
    </p>
    <form id="subscribe-form">
      <input type="email" id="email" name="email" placeholder="deine@email.at" required />
      <button type="submit">Anmelden</button>
    </form>
    <div id="status" role="status"></div>
    <p style="margin-top:1.5rem"><a href="https://htl.ing/">&larr; Zurück zu htl.ing</a></p>
  </div>
  <script>
    var form = document.getElementById('subscribe-form');
    var status = document.getElementById('status');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      status.textContent = 'Sende...';
      fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value }),
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
        .then(function (res) {
          if (res.ok && res.data.ok) {
            status.textContent = 'Fast geschafft! Bitte bestätige die Anmeldung über den Link in der E-Mail, die wir dir geschickt haben.';
            form.reset();
          } else {
            status.textContent = (res.data && res.data.error) || 'Etwas ist schiefgelaufen. Bitte später erneut versuchen.';
          }
        })
        .catch(function () {
          status.textContent = 'Etwas ist schiefgelaufen. Bitte später erneut versuchen.';
        });
    });
  </script>
</body>
</html>
